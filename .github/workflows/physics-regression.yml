name: Physics Regression
on:
  push:
    paths: ["src/qndt/physics/**", "tests/test_*.py"]
jobs:
  physics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Install system deps for PySide6
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl1 libglx-mesa0 libegl1 libxkbcommon0 libdbus-1-3
      - run: pip install -e ".[dev]"
      - name: Physics regression suite
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -m physics_regression -v --tb=long