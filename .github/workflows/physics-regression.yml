name: Physics Regression
on:
  push:
    paths: ["src/qndt/physics/**", "tests/test_*.py"]
jobs:
  physics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install -e ".[dev]"
      - name: Physics regression suite
        run: pytest tests/ -m physics_regression -v --tb=long
      - name: Install system deps for PySide6
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgl1 libglx-mesa0 libegl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxkbcommon-x11-0 x11-utils xvfb