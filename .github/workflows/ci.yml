name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system deps for PySide6
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgl1 libglx-mesa0 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxkbcommon-x11-0 x11-utils xvfb
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src/ tests/
      - name: Mypy
        run: mypy src/qndt/ --ignore-missing-imports
      - name: Test (headless)
        run: |
          export QT_QPA_PLATFORM=offscreen
          export DISPLAY=:99
          pytest tests/ -v --tb=short \
            --cov=src/qndt --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        if: matrix.python-version == '3.11'
